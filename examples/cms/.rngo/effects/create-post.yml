trigger: "hz(3, day)"
end: now
system: db
format:
  table: posts
schema:
  type: object
  properties:
    id:
      type: number
      minimum: 1
      scale: 0
      step: 1
    author_id:
      type: function
      expression: "author.id"
      variables:
        author:
          type: reference
          effect: create-author
    title:
      type: lorem.sentence
    slug:
      type: string
      pattern: "[a-z]{3,8}-[a-z]{3,8}-[a-z]{3,8}"
    body:
      type: lorem.paragraph
    status:
      type: select
      options:
        - weight: 3
          schema: { type: constant, value: "published" }
        - weight: 1
          schema: { type: constant, value: "draft" }
    created_at:
      type: context
      path: ["clock", "now"]
